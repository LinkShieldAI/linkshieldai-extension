<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkShield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #2c2f33 0%, #1a1c1f 100%);
            color: #ffffff;
            width: 400px;
            min-height: 500px;
            padding: 0;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(135deg, #7289da 0%, #5b6eae 100%);
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }

        .status-inactive {
            background: rgba(244, 67, 54, 0.3);
            border: 2px solid #F44336;
            color: #F44336;
        }

        .content {
            padding: 25px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #b9bbbe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #b9bbbe;
            margin-bottom: 6px;
        }

        #apiKey {
            width: 100%;
            padding: 12px 15px;
            background: #23272a;
            border: 2px solid #2c2f33;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        #apiKey:focus {
            border-color: #7289da;
            background: #2c2f33;
        }

        #apiKey::placeholder {
            color: #72767d;
        }

        #apiKey.valid {
            border-color: #4CAF50;
        }

        #apiKey.invalid {
            border-color: #F44336;
        }

        .validation-message {
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .validation-message.show {
            display: block;
        }

        .validation-message.success {
            color: #4CAF50;
        }

        .validation-message.error {
            color: #F44336;
        }

        .button {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-primary {
            background: linear-gradient(135deg, #7289da 0%, #5b6eae 100%);
            color: #ffffff;
        }

        .button-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 137, 218, 0.4);
        }

        .button-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .button-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-secondary {
            background: transparent;
            border: 2px solid #7289da;
            color: #7289da;
            margin-top: 10px;
        }

        .button-secondary:hover {
            background: rgba(114, 137, 218, 0.1);
        }

        .stats {
            background: #23272a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2c2f33;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 13px;
            color: #b9bbbe;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .footer {
            padding: 20px 25px;
            background: #23272a;
            border-top: 1px solid #2c2f33;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .footer-link {
            color: #7289da;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .footer-link:hover {
            color: #99aab5;
        }

        .version {
            font-size: 11px;
            color: #72767d;
            margin-top: 8px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #7289da;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-warning {
            background: rgba(255, 152, 0, 0.2);
            border-left: 4px solid #FF9800;
            color: #FFB74D;
        }

        .alert-info {
            background: rgba(33, 150, 243, 0.2);
            border-left: 4px solid #2196F3;
            color: #64B5F6;
        }
    </style>
</head>
<body>
    <div class="header">
        <img class="logo" src="images/lsa128.png" alt="LinkShield Logo">
        <h1>LinkShield</h1>
        <div id="statusBadge" class="status-badge status-inactive">Not Protected</div>
    </div>

    <div class="content">
        <!-- Alert Messages -->
        <div id="alertBox" class="alert"></div>

        <!-- API Key Section -->
        <div class="section">
            <div class="section-title">API Key Configuration</div>
            <div class="input-group">
                <label for="apiKey">Enter your API key</label>
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="sk_xxxxxxxxxxxxxxxxxxxxxxxx"
                    autocomplete="off"
                    spellcheck="false"
                >
                <div id="validationMsg" class="validation-message"></div>
            </div>
            <button id="saveBtn" class="button button-primary">
                <span id="saveBtnText">Save & Validate</span>
            </button>
            <button id="toggleKeyBtn" class="button button-secondary">Show API Key</button>
        </div>

        <!-- Statistics -->
        <div class="section">
            <div class="section-title">Protection Statistics</div>
            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">Sites Scanned Today</span>
                    <span class="stat-value" id="sitesScanned">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Threats Blocked</span>
                    <span class="stat-value" id="threatsBlocked">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Cache Size</span>
                    <span class="stat-value" id="cacheSize">0</span>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section">
            <div class="section-title">Quick Actions</div>
            <button id="clearCacheBtn" class="button button-secondary">Clear Cache</button>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <a href="#" id="viewHistoryLink" class="footer-link">View History</a>
            <a href="#" id="manageWhitelistLink" class="footer-link">Manage Whitelist</a>
            <a href="#" id="settingsLink" class="footer-link">Advanced Settings</a>
        </div>
        <div class="version" id="version">Version 1.1.0</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
